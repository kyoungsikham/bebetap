name: bebetap
description: "BebeTap - 초보 부모를 위한 글로벌 육아 기록 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0-210.1.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.12.0

  # 상태 관리 & 라우팅
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.3

  # 로컬 DB (오프라인 우선)
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.29

  # 네트워크
  connectivity_plus: ^6.1.4

  # 소셜 로그인
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  flutter_naver_login: ^2.1.1
  kakao_flutter_sdk_user: ^1.9.9
  flutter_facebook_auth: ^7.1.1
  flutter_web_auth_2: ^4.0.1

  # UI
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  gap: ^3.0.1
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.1

  # 홈 위젯
  home_widget: ^0.7.0

  # 기타
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.2
  drift_dev: ^2.22.1
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_lint: ^2.6.2
  custom_lint: ^0.7.4

flutter:
  uses-material-design: true
  generate: true
