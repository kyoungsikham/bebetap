<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BebeTap 비밀번호 재설정</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f8; margin: 0; padding: 20px; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 16px; overflow: hidden; }
    .header { background: #5B7FFF; padding: 32px; text-align: center; }
    .header h1 { color: white; margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: rgba(255,255,255,0.85); margin: 8px 0 0; font-size: 14px; }
    .body { padding: 32px; }
    .body p { color: #1A1A2E; font-size: 15px; line-height: 1.6; margin: 0 0 16px; }
    .btn { display: block; background: #5B7FFF; color: white; text-decoration: none; text-align: center; padding: 16px 24px; border-radius: 12px; font-size: 16px; font-weight: 600; margin: 24px 0; }
    .notice-box { background: #FFF8E1; border: 1px solid #FFE082; border-radius: 12px; padding: 16px 20px; margin: 20px 0; }
    .notice-box p { color: #795548; font-size: 13px; line-height: 1.6; margin: 0; }
    .notice-box strong { color: #5D4037; }
    .footer { padding: 20px 32px; border-top: 1px solid #EBEBEF; }
    .footer p { color: #8A8A9A; font-size: 12px; line-height: 1.5; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍼 BebeTap</h1>
      <p>초보 부모를 위한 육아 기록 앱</p>
    </div>
    <div class="body">
      <p>비밀번호 재설정을 요청하셨습니다.<br>아래 버튼을 눌러 새 비밀번호를 설정하세요.</p>

      <a href="{{ .ConfirmationURL }}" class="btn">📱 새 비밀번호 설정하기</a>

      <div class="notice-box">
        <p>⚠️ <strong>주의사항</strong><br>
        위 버튼은 <strong>스마트폰(iOS/Android)</strong>에서만 작동합니다.<br>
        PC나 데스크탑 브라우저에서는 열리지 않으니,<br>
        이 이메일을 <strong>핸드폰으로 확인하여</strong> 버튼을 눌러주세요.</p>
      </div>

      <p style="font-size:13px; color:#8A8A9A;">링크는 발송 후 1시간 동안만 유효합니다.<br>본인이 요청하지 않은 경우 이 이메일을 무시해주세요.</p>
    </div>
    <div class="footer">
      <p>BebeTap · powered by Supabase</p>
    </div>
  </div>
</body>
</html>
