<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BebeTap 인증 코드</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f8; margin: 0; padding: 20px; }
    .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 16px; overflow: hidden; }
    .header { background: #5B7FFF; padding: 32px; text-align: center; }
    .header h1 { color: white; margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: rgba(255,255,255,0.85); margin: 8px 0 0; font-size: 14px; }
    .body { padding: 32px; }
    .body p { color: #1A1A2E; font-size: 15px; line-height: 1.6; margin: 0 0 24px; }
    .otp-box { background: #F2F2F5; border-radius: 12px; padding: 24px; text-align: center; margin: 24px 0; }
    .otp-code { font-size: 40px; font-weight: 800; letter-spacing: 8px; color: #5B7FFF; }
    .otp-label { font-size: 13px; color: #8A8A9A; margin-top: 8px; }
    .footer { padding: 20px 32px; border-top: 1px solid #EBEBEF; }
    .footer p { color: #8A8A9A; font-size: 12px; line-height: 1.5; margin: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🍼 BebeTap</h1>
      <p>초보 부모를 위한 육아 기록 앱</p>
    </div>
    <div class="body">
      <p>안녕하세요!<br>BebeTap 인증 코드를 알려드립니다.<br>아래 6자리 코드를 앱에 입력해주세요.</p>
      <div class="otp-box">
        <div class="otp-code">{{ .Token }}</div>
        <div class="otp-label">유효 시간: 1시간</div>
      </div>
      <p style="font-size:13px; color:#8A8A9A;">본인이 요청하지 않은 경우 이 이메일을 무시해주세요.</p>
    </div>
    <div class="footer">
      <p>BebeTap · powered by Supabase</p>
    </div>
  </div>
</body>
</html>
